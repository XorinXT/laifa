<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAIFA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Helvetica,Arial,sans-serif;background:#fff;color:#111}
header{border-bottom:1px solid #e5e5e5}
.container{max-width:1100px;margin:auto;padding:20px}
.nav{display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:700;letter-spacing:4px}

select{padding:6px}

.hero{padding:60px 0}
.hero h1{font-size:40px;margin-bottom:30px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:60px}

.product-image{
border:1px solid #e5e5e5;
padding:40px;
background:#f7f7f7;
display:flex;align-items:center;justify-content:center
}

.product-image img{max-width:100%;height:auto}

.product-info h2{font-size:26px;margin-bottom:10px}
.price{font-size:18px;margin-bottom:20px}

button{
border:1px solid #111;
background:#fff;
padding:12px 22px;
cursor:pointer;
letter-spacing:1px
}

button:hover{background:#111;color:#fff}

.cart{
position:fixed;
right:20px;
top:20px;
border:1px solid #111;
padding:10px 16px;
background:#fff;
font-size:14px
}

.cart-panel{
position:fixed;
right:20px;
top:70px;
border:1px solid #111;
padding:20px;
background:#fff;
width:250px;
display:none
}

footer{border-top:1px solid #e5e5e5;margin-top:80px;font-size:13px;color:#777}

@media(max-width:800px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<div class="container nav">
<div class="logo">LAIFA</div>
<div>
Currency:
<select id="currency">
<option value="GBP">GBP £</option>
<option value="USD">USD $</option>
<option value="EUR">EUR €</option>
<option value="JPY">JPY ¥</option>
<option value="AUD">AUD $</option>
<option value="CAD">CAD $</option>
</select>
</div>
</div>
</header>

<div class="cart" onclick="toggleCart()">Basket (<span id="cartCount">0</span>)</div>

<div class="cart-panel" id="cartPanel">
<h3>Basket</h3>
<div id="cartItems"></div>
<br>
<a href="https://ironclad31.gumroad.com/l/fnlcq" target="_blank">
<button>Checkout</button>
</a>
</div>

<section class="hero">
<div class="container">
<h1>LAIFA</h1>

<div class="grid">

<div class="product-image">
<img src="laifaicon.png" alt="Product 1">
</div>

<div class="product-info">
<h2>Product 1</h2>
<div class="price" id="price">£500</div>
<button onclick="addToCart()">Add to Basket</button>
</div>

</div>
</div>
</section>

<footer>
<div class="container">LAIFA</div>
</footer>

<script>

let basePrice = 500

let rates = {
GBP:1,
USD:1.27,
EUR:1.16,
JPY:190,
AUD:1.95,
CAD:1.72
}

let symbols = {
GBP:"£",
USD:"$",
EUR:"€",
JPY:"¥",
AUD:"$",
CAD:"$"
}

let cart = []

function updatePrice(){
let currency = document.getElementById("currency").value
let converted = basePrice * rates[currency]
converted = converted.toFixed(2)

document.getElementById("price").innerText = symbols[currency] + converted
}

function addToCart(){
cart.push("Product 1")

document.getElementById("cartCount").innerText = cart.length

let list=""
cart.forEach(p=>{
list += "<div>"+p+"</div>"
})

document.getElementById("cartItems").innerHTML = list
}

function toggleCart(){
let panel=document.getElementById("cartPanel")

if(panel.style.display==="block"){
panel.style.display="none"
}else{
panel.style.display="block"
}
}


document.getElementById("currency").addEventListener("change",updatePrice)

updatePrice()

</script>

</body>
</html>
