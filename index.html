<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAIFA</title>
<style>*{box-sizing:border-box;margin:0;padding:0}

body{ font-family:Helvetica,Arial,sans-serif; background:white; color:#111; }

header{ border-bottom:1px solid #e5e5e5; }

.container{ max-width:1200px; margin:auto; padding:20px; }

.nav{ display:flex; justify-content:space-between; align-items:center; }

.logo{ font-weight:700; letter-spacing:4px; }

.nav a{ text-decoration:none; color:#111; font-size:14px; margin-left:20px; }

.hero{ padding:80px 0 60px; }

.hero h1{ font-size:42px; font-weight:600; letter-spacing:2px; margin-bottom:10px; }

.grid{ display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start; margin-top:60px; }

.product-image{ background:#f4f4f4; height:500px; display:flex; align-items:center; justify-content:center; border:1px solid #e5e5e5; }

.product-image span{ font-size:14px; color:#777; }

.product-info h2{ font-size:28px; margin-bottom:10px; }

.price{ font-size:18px; margin-bottom:30px; }

button{ border:1px solid #111; background:white; padding:12px 22px; font-size:13px; letter-spacing:1px; cursor:pointer; }

button:hover{ background:#111; color:white; }

footer{ border-top:1px solid #e5e5e5; margin-top:100px; font-size:13px; color:#777; }

@media(max-width:800px){ .grid{ grid-template-columns:1fr; } }

</style>
</head><body><header>
<div class="container nav">
<div class="logo">LAIFA</div>
<nav>
<a href="#">PRODUCT</a>
</nav>
</div>
</header><section class="hero">
<div class="container">
<h1>LAIFA</h1><div class="grid"><div class="product-image">
<span>Product Image</span>
</div><div class="product-info">
<h2>Product 1</h2>
<div class="price">£500</div>
<button>ADD TO CART</button>
</div></div>
</div>
</section><footer>
<div class="container">
LAIFA
</div>
</footer></body>
</html>
