<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LAIFA</title>
<link rel="icon" type="image/png" href="laifaicon.png">

<style>

:root{
--accent:#111;
--ease:cubic-bezier(.16,1,.3,1);
--max-width:1100px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:#fff;
color:#111;
overflow-x:hidden;
line-height:1.5;
}

/* IMAGES */
img{
max-width:100%;
height:auto;
display:block;
}

/* CONTAINER */

.container{
width:min(var(--max-width),92%);
margin:auto;
}

/* HEADER */

header{
border-bottom:1px solid #eee;
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 0;
}

.logo{
font-weight:700;
letter-spacing:4px;
font-size:18px;
}

select{
padding:6px 10px;
border:1px solid #eee;
background:transparent;
cursor:pointer;
}

/* WAVES */

.wave-background{
position:fixed;
inset:0;
z-index:-1;
overflow:hidden;
}

.wave{
position:absolute;
bottom:0;
left:0;
width:200%;
height:25vh;
min-height:180px;
background-repeat:repeat-x;
background-size:50% 100%;
animation:waveMove 20s linear infinite;
}

.wave.one{
opacity:.08;
background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100"><path d="M0,50 C150,100 350,0 500,50 C650,100 850,0 1000,50 L1000,100 L0,100 Z" fill="black"/></svg>');
}

.wave.two{
opacity:.04;
animation-duration:15s;
animation-direction:reverse;
background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100"><path d="M0,50 C150,100 350,0 500,50 C650,100 850,0 1000,50 L1000,100 L0,100 Z" fill="black"/></svg>');
}

@keyframes waveMove{
from{transform:translateX(0)}
to{transform:translateX(-50%)}
}

/* HERO */

.hero{
padding:70px 0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:clamp(30px,5vw,60px);
align-items:center;
margin-bottom:90px;
}

/* PRODUCT */

.product-image{
border:1px solid #e5e5e5;
padding:40px;
background:rgba(255,255,255,.7);
backdrop-filter:blur(5px);
display:flex;
justify-content:center;
align-items:center;
}

.product-image img{
transition:.6s;
}

.product-image:hover img{
transform:scale(1.05);
}

.product-info h2{
font-size:24px;
margin-bottom:10px;
}

.price{
font-weight:700;
margin:15px 0;
font-size:18px;
}

button{
border:1px solid #111;
background:transparent;
padding:14px 28px;
cursor:pointer;
text-transform:uppercase;
font-size:11px;
font-weight:700;
transition:.3s;
}

button:hover:not(:disabled){
background:#111;
color:#fff;
}

/* CART */

.cart-trigger{
position:fixed;
right:25px;
top:20px;
z-index:101;
font-size:11px;
font-weight:700;
cursor:pointer;
background:#fff;
padding:10px 18px;
border:1px solid #111;
}

.cart-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
z-index:200;
display:none;
}

.cart-panel{
position:fixed;
top:0;
right:-420px;
height:100vh;
width:min(380px,100%);
background:#fff;
z-index:201;
padding:40px 30px;
transition:.4s var(--ease);
display:flex;
flex-direction:column;
}

.cart-panel.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid #eee;
}

.remove-btn{
background:none;
border:none;
cursor:pointer;
color:#999;
font-size:16px;
}

/* PAYMENT MODAL */

.checkout-modal-bg{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
z-index:300;
display:none;
}

.payment-modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:40px;
z-index:301;
width:min(460px,92%);
border:1px solid #111;
box-shadow:20px 20px 0 rgba(0,0,0,.05);
display:none;
}

.payment-modal h3{
font-weight:400;
letter-spacing:2px;
font-size:22px;
margin-bottom:25px;
border-bottom:1px solid #eee;
padding-bottom:10px;
}

.card-field{
margin-bottom:18px;
}

.card-field label{
display:block;
font-size:10px;
text-transform:uppercase;
letter-spacing:1px;
margin-bottom:5px;
color:#555;
}

.card-field input{
width:100%;
padding:13px 10px;
border:1px solid #ddd;
background:#f9f9f9;
font-size:16px;
}

.card-field input:focus{
outline:none;
border-color:#111;
background:#fff;
}

.row-2col{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.payment-footer{
margin-top:20px;
display:flex;
gap:10px;
justify-content:flex-end;
}

/* LOADER */

.spinner{
width:40px;
height:40px;
border:3px solid #eee;
border-top:3px solid #111;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* MOBILE */

@media (max-width:800px){

.grid{
grid-template-columns:1fr;
gap:35px;
margin-bottom:60px;
}

.hero{
padding:50px 0;
}

.product-image{
padding:25px;
}

.cart-trigger{
right:15px;
}

}

</style>
</head>

<body>

<div class="wave-background">
<div class="wave one"></div>
<div class="wave two"></div>
</div>

<header>
<div class="container nav">
<div class="logo">LAIFA</div>

<select id="currency">
<option value="GBP">🇬🇧 GBP £</option>
<option value="USD">🇺🇸 USD $</option>
<option value="EUR">🇪🇺 EUR €</option>
<option value="JPY">🇯🇵 JPY ¥</option>
</select>

</div>
</header>

<div class="cart-trigger" onclick="toggleCart()">
BASKET (<span id="cartCount">0</span>)
</div>

<div class="cart-overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart-panel" id="cartPanel">

<h3>YOUR BASKET</h3>
<hr style="margin:20px 0;border:0;border-top:1px solid #eee">

<div id="cartItems">
<p style="color:#999;font-style:italic;">Your basket is empty.</p>
</div>

<div style="margin-top:auto">

<div id="cartTotal" style="margin-bottom:15px;font-weight:700;text-align:right;"></div>

<button id="checkoutBtn" disabled style="width:100%" onclick="openPaymentModal()">
Checkout
</button>

</div>
</div>

<div class="checkout-modal-bg" id="paymentModalBg"></div>

<div class="payment-modal" id="paymentModal">

<h3>PAYMENT</h3>

<div id="paymentFormContainer">

<div class="card-field">
<label>Card number</label>
<input type="text" placeholder="1234 5678 9012 3456">
</div>

<div class="card-field">
<label>Cardholder name</label>
<input type="text" placeholder="LAIFA CUSTOMER">
</div>

<div class="row-2col">

<div class="card-field">
<label>Expiry</label>
<input type="text" placeholder="MM/YY">
</div>

<div class="card-field">
<label>CVC</label>
<input type="text" placeholder="123">
</div>

</div>

</div>

<div id="paymentProcessing" style="display:none;text-align:center">
<p>VERIFYING...</p>
<div class="spinner"></div>
</div>

<div id="paymentSuccess" style="display:none;text-align:center">
<h2>✓ ORDER PLACED</h2>
<p style="color:#555;margin:15px 0">Thank you, your order is confirmed.</p>
<button onclick="resetShop()">Continue shopping</button>
</div>

<div class="payment-footer" id="paymentActions">
<button onclick="closePaymentModal()">Cancel</button>
<button onclick="submitDemoPayment()" style="background:#111;color:#fff">Pay now</button>
</div>

</div>

<section class="container hero">

<div class="grid">

<div class="product-image">
<img src="laifaicon.png">
</div>

<div class="product-info">
<h2>LAIFA ICON . PNG</h2>
<div class="price" data-base="500">£500.00</div>
<button onclick="addToCart('LAIFA Icon PNG',500)">Add to Basket</button>
</div>

</div>

<div class="grid">

<div class="product-image">
<img src="sweater.jpg">
</div>

<div class="product-info">
<h2>LAIFA SWEATER</h2>
<div class="price" data-base="65">£65.00</div>
<button onclick="addToCart('LAIFA Sweater',65)">Add to Basket</button>
</div>

</div>

</section>

<script>

let cart=[]
const rates={GBP:1,USD:1.27,EUR:1.17,JPY:188}
const symbols={GBP:"£",USD:"$",EUR:"€",JPY:"¥"}
let currentCurrency="GBP"

function updateDisplayPrices(){
document.querySelectorAll(".price").forEach(el=>{
const base=parseFloat(el.dataset.base)
const converted=base*rates[currentCurrency]
el.innerText=symbols[currentCurrency]+converted.toFixed(2)
})
}

document.getElementById("currency").addEventListener("change",e=>{
currentCurrency=e.target.value
updateDisplayPrices()
updateCartUI()
})

function addToCart(name,price){
cart.push({name,price})
updateCartUI()
toggleCart()
}

function removeItem(i){
cart.splice(i,1)
updateCartUI()
}

function updateCartUI(){

const items=document.getElementById("cartItems")
const count=document.getElementById("cartCount")
const totalUI=document.getElementById("cartTotal")
const checkout=document.getElementById("checkoutBtn")

count.innerText=cart.length

if(cart.length===0){
items.innerHTML=`<p style="color:#999;font-style:italic;">Your basket is empty.</p>`
totalUI.innerText=""
checkout.disabled=true
return
}

checkout.disabled=false
items.innerHTML=""

let total=0

cart.forEach((item,i)=>{

const converted=item.price*rates[currentCurrency]
total+=converted

const div=document.createElement("div")
div.className="cart-item"

div.innerHTML=`
<div>
<div style="font-weight:700;font-size:13px">${item.name}</div>
<div style="font-size:12px">${symbols[currentCurrency]}${converted.toFixed(2)}</div>
</div>
<button class="remove-btn" onclick="removeItem(${i})">✕</button>
`

items.appendChild(div)

})

totalUI.innerText="TOTAL: "+symbols[currentCurrency]+total.toFixed(2)

}

function toggleCart(){
const panel=document.getElementById("cartPanel")
const overlay=document.getElementById("overlay")

panel.classList.toggle("active")
overlay.style.display=panel.classList.contains("active")?"block":"none"
}

function openPaymentModal(){
document.getElementById("cartPanel").classList.remove("active")
document.getElementById("overlay").style.display="none"

document.getElementById("paymentModalBg").style.display="block"
document.getElementById("paymentModal").style.display="block"
}

function closePaymentModal(){
document.getElementById("paymentModalBg").style.display="none"
document.getElementById("paymentModal").style.display="none"
}

function submitDemoPayment(){

document.getElementById("paymentFormContainer").style.display="none"
document.getElementById("paymentActions").style.display="none"
document.getElementById("paymentProcessing").style.display="block"

setTimeout(()=>{

document.getElementById("paymentProcessing").style.display="none"
document.getElementById("paymentSuccess").style.display="block"

cart=[]
updateCartUI()

},2500)

}

function resetShop(){

closePaymentModal()

cart=[]
updateCartUI()

}

updateDisplayPrices()

</script>

</body>
</html>
