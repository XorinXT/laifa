<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Announcements</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* Stream full screen */
#stream {
  width: 100vw;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Centered messages overlay */
#messagesOverlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}

.message {
  display: inline-block;
  font-weight: bold;
  color: white;
  -webkit-text-stroke: 1px black;
  font-size: 30px;
  margin: 5px 0;
  background: rgba(255,255,255,0.05);
  padding: 5px 10px;
  border-radius: 5px;
  opacity: 1;
  transition: opacity 0.5s;
}

/* Admin panel */
#adminPanel {
  display: none; /* Hide initially */
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  padding: 20px;
  border: 2px solid #fff;
  border-radius: 10px;
  z-index: 10;
  cursor: grab;
}

/* Admin inputs */
#adminPanel input {
  display: block;
  width: 200px;
  padding: 5px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

#adminPanel button {
  padding: 5px 10px;
  cursor: pointer;
}

/* Top-left admin button */
#openAdminBtn {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 15;
  padding: 8px 12px;
  background: #222;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>
<body>

<div id="stream">
  <iframe src="https://247stream.pro/watch.php?stream=channels_tnt1fhd"></iframe>
</div>

<div id="messagesOverlay"></div>

<button id="openAdminBtn">Admin</button>

<div id="adminPanel">
  <h3>Admin Login</h3>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyAGQLiTb9x2i-pjTI5msa2UwDOcwYj442Y",
  authDomain: "laifa-9f4d0.firebaseapp.com",
  projectId: "laifa-9f4d0",
  storageBucket: "laifa-9f4d0.firebasestorage.app",
  messagingSenderId: "61780996611",
  appId: "1:61780996611:web:0017be428adb1002119436",
  measurementId: "G-Q4HTYK7TJB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- References ---
const adminPanel = document.getElementById("adminPanel");
const openAdminBtn = document.getElementById("openAdminBtn");
const loginBtn = document.getElementById("loginBtn");
const messagesOverlay = document.getElementById("messagesOverlay");

openAdminBtn.addEventListener("click", () => {
  adminPanel.style.display = "block"; // Show panel only when button clicked
});

// --- Dragging admin panel ---
let isDragging = false;
let offsetX, offsetY;

adminPanel.addEventListener("mousedown", e => {
  isDragging = true;
  offsetX = e.clientX - adminPanel.offsetLeft;
  offsetY = e.clientY - adminPanel.offsetTop;
  adminPanel.style.cursor = "grabbing";
});

document.addEventListener("mousemove", e => {
  if(isDragging){
    adminPanel.style.left = (e.clientX - offsetX) + "px";
    adminPanel.style.top = (e.clientY - offsetY) + "px";
  }
});

document.addEventListener("mouseup", () => {
  isDragging = false;
  adminPanel.style.cursor = "grab";
});

// --- Login ---
loginBtn.addEventListener("click", () => {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(username === "admin123" && password === "password123"){
    adminPanel.innerHTML = `
      <h3>Add Announcement</h3>
      <input type="text" id="announcementInput" placeholder="Type announcement">
      <button id="sendBtn">Send</button>
    `;

    document.getElementById("sendBtn").addEventListener("click", async () => {
      const input = document.getElementById("announcementInput");
      if(input.value.trim() === "") return;

      await addDoc(collection(db,"announcements"), {
        text: input.value,
        time: Date.now()
      });

      input.value = "";
    });
  } else {
    alert("Wrong username or password!");
  }
});

// --- Live announcements ---
const q = query(collection(db,"announcements"), orderBy("time"));
onSnapshot(q, snapshot => {
  snapshot.forEach(doc => {
    const div = document.createElement("div");
    div.className = "message";
    div.textContent = doc.data().text;
    messagesOverlay.appendChild(div);

    // Auto-remove after 5 seconds
    setTimeout(() => {
      div.style.opacity = 0;
      setTimeout(() => div.remove(), 500);
    }, 5000);
  });
});
</script>

</body>
</html>
