<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALA MADRID COME ON LADS!</title>
<style>
    body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:black; color:white; overflow:hidden; }
    
    /* Background Stream */
    #stream { width:100vw; height:100vh; position: absolute; top:0; left:0; z-index: 1; }
    iframe { width:100%; height:100%; border:none; }

    /* Messages Overlay - Placed on top of the video */
    #messagesOverlay { 
        position:absolute; 
        top: 10%; 
        left:50%; 
        transform:translateX(-50%); 
        text-align:center; 
        pointer-events:none; 
        z-index: 100; 
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 80%;
    }

    .message { 
        display: block; 
        font-weight: bold; 
        color: white; 
        text-shadow: 2px 2px 8px rgba(0,0,0,1); 
        font-size: 32px; 
        margin: 10px 0; 
        background: rgba(0,0,0,0.5); 
        padding: 12px 25px; 
        border-radius: 8px; 
        border: 1px solid rgba(255,255,255,0.2);
        opacity: 0; 
        transform: translateY(20px);
        transition: opacity 0.5s, transform 0.5s; 
    }

    /* Admin Styles */
    #adminPanel { 
        display:none; 
        position:fixed; 
        top:50%; 
        left:50%; 
        transform:translate(-50%, -50%); 
        background:#1a1a1a; 
        padding:25px; 
        border:1px solid #444; 
        border-radius:12px; 
        z-index: 200; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        cursor: grab; 
    }
    #adminPanel h3 { margin-top: 0; }
    #adminPanel input { display:block; width:220px; padding:10px; margin:10px 0; border:1px solid #333; background: #000; color: white; border-radius:5px; }
    #adminPanel button { width: 100%; padding:10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    #adminPanel button:hover { background: #0056b3; }
    
    #openAdminBtn { position:fixed; top:15px; left:15px; z-index:210; padding:10px 15px; background:rgba(0,0,0,0.5); border:1px solid #444; color:white; cursor:pointer; border-radius:50%; font-weight: bold; }
</style>
</head>
<body>

<div id="stream">
    <iframe src="https://247stream.pro/watch.php?stream=channels_tnt1fhd" allowfullscreen></iframe>
</div>

<div id="messagesOverlay"></div>

<button id="openAdminBtn">?</button>

<div id="adminPanel">
    <div id="loginSection">
        <h3>Admin Login</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyAGQLiTb9x2i-pjTI5msa2UwDOcwYj442Y",
    authDomain: "laifa-9f4d0.firebaseapp.com",
    projectId: "laifa-9f4d0",
    storageBucket: "laifa-9f4d0.firebasestorage.app",
    messagingSenderId: "61780996611",
    appId: "1:61780996611:web:0017be428adb1002119436",
    measurementId: "G-Q4HTYK7TJB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const adminPanel = document.getElementById("adminPanel");
const openAdminBtn = document.getElementById("openAdminBtn");
const loginBtn = document.getElementById("loginBtn");
const messagesOverlay = document.getElementById("messagesOverlay");

// Toggle Admin Panel
openAdminBtn.addEventListener("click", () => { 
    adminPanel.style.display = (adminPanel.style.display === "block") ? "none" : "block"; 
});

// Admin Dragging logic
let isDragging = false, offsetX, offsetY;
adminPanel.addEventListener("mousedown", e => { 
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    isDragging = true; 
    offsetX = e.clientX - adminPanel.offsetLeft; 
    offsetY = e.clientY - adminPanel.offsetTop; 
    adminPanel.style.cursor="grabbing"; 
});
document.addEventListener("mousemove", e => { 
    if(isDragging){ 
        adminPanel.style.left=(e.clientX-offsetX)+"px"; 
        adminPanel.style.top=(e.clientY-offsetY)+"px"; 
    } 
});
document.addEventListener("mouseup", () => { isDragging=false; adminPanel.style.cursor="grab"; });

// Login & UI Update
loginBtn.addEventListener("click", () => {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    if(user === "admin123" && pass === "password123"){
        adminPanel.innerHTML = `
            <h3>Send Message</h3>
            <input type="text" id="announcementInput" placeholder="Message content...">
            <button id="sendBtn">Push to Screen</button>
        `;
        document.getElementById("sendBtn").addEventListener("click", async () => {
            const input = document.getElementById("announcementInput");
            if(!input.value.trim()) return;
            try {
                await addDoc(collection(db, "announcements"), { 
                    text: input.value, 
                    time: Date.now() 
                });
                input.value = "";
            } catch (e) { console.error("Error sending: ", e); }
        });
    } else { alert("Access Denied"); }
});

// Listener: Only react to NEW additions
const q = query(collection(db, "announcements"), orderBy("time", "desc"), limit(5));

onSnapshot(q, (snapshot) => {
    snapshot.docChanges().forEach((change) => {
        if (change.type === "added") {
            const data = change.doc.data();
            
            // Ignore historical data (older than 15 seconds) so messages don't pop up on page load
            if (data.time < Date.now() - 15000) return;

            renderMessage(data.text);
        }
    });
});

function renderMessage(text) {
    const div = document.createElement("div");
    div.className = "message";
    div.textContent = text;
    
    // Add to screen
    messagesOverlay.appendChild(div);
    
    // Trigger animation
    setTimeout(() => {
        div.style.opacity = "1";
        div.style.transform = "translateY(0)";
    }, 50);

    // Fade out and remove after 7 seconds
    setTimeout(() => {
        div.style.opacity = "0";
        div.style.transform = "translateY(-20px)";
        setTimeout(() => div.remove(), 500);
    }, 7000);
}
</script>

</body>
</html>
